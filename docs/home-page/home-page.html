<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Steps</title>
    <link rel="stylesheet" href="../../css/output.css" />
    <link rel="stylesheet" href="../../css/main.css" />
  </head>

  <body class="w-full h-screen flex flex-col justify-between overflow-auto bg-color cutive-mono-regular">
    <!-- NAV -->
    <div class="flex justify-between items-center relative">
      <p id="coinDisplay" class="border-color border-2 p-2 border-dashed ml-2">Coins: 0.0</p>

      <h1 class="text-5xl absolute left-1/2 transform -translate-x-1/2">"STEPS"</h1>

      <div class="flex">
        <button id="userName" class="border-color border-2 p-2 border-dashed hover:bg-red-500 mr-2">Name:</button>
      </div>
    </div>

    <!-- SECTION -->

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 p-3">
      <!-- PACHINKO -->

      <a
        href="../pachinko/index.html"
        class="group relative block h-64 sm:h-80"
      >
        <span
          class="absolute inset-0 border-2 border-dashed border-color"
        ></span>

        <div
          class="relative flex h-full transform items-end border-2 border-color bg-color transition-transform group-hover:-translate-x-2 group-hover:-translate-y-2"
        >
          <div
            class="p-4 !pt-0 transition-opacity group-hover:absolute group-hover:opacity-0 sm:p-6 lg:p-8"
          >
            <img src="ikone/pachinko.svg" class="filter-white" />

            <h2 class="mt-4 text-xl sm:text-2xl">Pachinko</h2>
          </div>

          <div
            class="absolute p-4 opacity-0 transition-opacity group-hover:relative group-hover:opacity-100 sm:p-6 lg:p-8"
          >
            <h3 class="mt-4 text-xl sm:text-2xl">Pachinko</h3>

            <p class="mt-4 text-sm sm:text-base">
              Suck the balls into the hole and win the game.
            </p>

            <p class="mt-8 font-bold border-color border-2 p-2 border-dashed w-fit hover:bg-red-500">Press</p>
          </div>
        </div>
      </a>

      <!-- MINES -->

      <a href="../mines/index.html" class="group relative block h-64 sm:h-80">
        <span
          class="absolute inset-0 border-2 border-dashed border-color"
        ></span>

        <div
          class="relative flex h-full transform items-end border-2 border-color bg-color transition-transform group-hover:-translate-x-2 group-hover:-translate-y-2"
        >
          <div
            class="p-4 !pt-0 transition-opacity group-hover:absolute group-hover:opacity-0 sm:p-6 lg:p-8"
          >
            <img src="ikone/bomb.svg" class="filter-white" />

            <h2 class="mt-4 text-xl sm:text-2xl">Mines</h2>
          </div>

          <div
            class="absolute p-4 opacity-0 transition-opacity group-hover:relative group-hover:opacity-100 sm:p-6 lg:p-8"
          >
            <h3 class="mt-4 text-xl sm:text-2xl">Mines</h3>

            <p class="mt-4 text-sm sm:text-base">
              Mines are everywhere. You have to find them and avoid them.
            </p>

            <p class="mt-8 font-bold border-color border-2 p-2 border-dashed w-fit hover:bg-red-500">Press</p>
          </div>
        </div>
      </a>

      <!-- BLACK JACK -->
      <a
        href="../blackjack/index.html"
        class="group relative block h-64 sm:h-80"
      >
        <span
          class="absolute inset-0 border-2 border-dashed border-color"
        ></span>

        <div
          class="relative flex h-full transform items-end border-2 border-color bg-color transition-transform group-hover:-translate-x-2 group-hover:-translate-y-2"
        >
          <div
            class="p-4 !pt-0 transition-opacity group-hover:absolute group-hover:opacity-0 sm:p-6 lg:p-8"
          >
            <img src="ikone/playing-cards.svg" class="filter-white" />

            <h2 class="mt-4 text-xl sm:text-2xl">Black Jack</h2>
          </div>

          <div
            class="absolute p-4 opacity-0 transition-opacity group-hover:relative group-hover:opacity-100 sm:p-6 lg:p-8"
          >
            <h3 class="mt-4 text-xl sm:text-2xl">Black Jack</h3>

            <p class="mt-4 text-sm sm:text-base">
              Jack Black is a great actor and a great musician. He is also a
              great game.
            </p>

            <p class="mt-8 font-bold border-color border-2 p-2 border-dashed w-fit hover:bg-red-500">Press</p>
          </div>
        </div>
      </a>
    </div>
    <script src="../../js/main.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script>
      // Get the query parameters from the URL
      var urlParams = new URLSearchParams(window.location.search);
      var userName = urlParams.get('username');

      // Set the text of the userName element
      document.getElementById('userName').textContent = 'userName: ' + userName;

      // Fetch the step count data
      var access_token = sessionStorage.getItem('access_token');

      if (!access_token) {
        console.error('Access token not found in session storage.');
        return;
      }

      // Create a new XMLHttpRequest
      var xhr = new XMLHttpRequest();

      // Setup our listener to process completed requests
      xhr.onload = function () {
        if (xhr.status >= 200 && xhr.status < 300) {
          // The request has been completed successfully
          try {
            var response = JSON.parse(xhr.responseText);
            if (response.bucket && response.bucket[0].dataset && response.bucket[0].dataset[0].point && response.bucket[0].dataset[0].point[0].value && response.bucket[0].dataset[0].point[0].value[0].intVal) {
              var steps = response.bucket[0].dataset[0].point[0].value[0].intVal;
              var coins = steps / 100;
              document.getElementById('coinDisplay').textContent = 'Coins: ' + coins.toFixed(2);
            } else {
              console.error('Unexpected response structure from Google Fit API.');
            }
          } catch (e) {
            console.error('Error parsing response from Google Fit API:', e);
          }
        } else {
          // The request has failed
          console.error('Error:', xhr.status);
        }
      };

      // Configure the request
      xhr.open('POST', 'https://www.googleapis.com/fitness/v1/users/me/dataset:aggregate');
      xhr.setRequestHeader('Authorization', 'Bearer ' + access_token);
      xhr.setRequestHeader('Content-Type', 'application/json');

      // Prepare the data
      var data = JSON.stringify({
        "aggregateBy": [{
          "dataTypeName": "com.google.step_count.delta",
          "dataSourceId": "derived:com.google.step_count.delta:com.google.android.gms:estimated_steps"
        }],
        "bucketByTime": { "durationMillis": 86400000 },
        "startTimeMillis": Date.now() - 86400000,
        "endTimeMillis": Date.now()
      });

      // Send the request
      xhr.send(data);
    </script>
  </body>
</html>
