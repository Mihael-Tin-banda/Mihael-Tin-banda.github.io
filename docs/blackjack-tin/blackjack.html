<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="game">
        <div class="dealer">
            <h2>Dealer's Cards</h2>
            <div id="dealer-cards" class="cards"></div>
        </div>
        <div class="player">
            <h2>Your Cards</h2>
            <div id="player-cards" class="cards"></div>
            <div id="player-bet" class="bet"></div>
            <div id="player-coins" class="coins"></div>
            <button id="btn-bet" class="btn">Bet</button>
            <button id="btn-hit" class="btn">Hit</button>
            <button id="btn-stand" class="btn">Stand</button>
        </div>
    </div>

    <script src="blackjack.js"></script>
</body>
</html>
