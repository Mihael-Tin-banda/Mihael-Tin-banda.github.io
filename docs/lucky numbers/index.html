<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky Numbers</title>
    <link rel="stylesheet" href="../../css/output.css">
    <link rel="stylesheet" href="../../css/main.css">
    <link rel="stylesheet" href="main.css">

    <style>
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
               -webkit-appearance: none;
                margin: 0;
        }
 
        input[type=number] {
            -moz-appearance: textfield;
        }

        .fade-out{
            transition: background-color 1.3s;
            background-color: transparent !important;
        }
    </style>

</head>
<body class="bg-color">
    <div class="flex md:flex-row flex-col justify-between items-center relative mt-2">
        <a href="../../index.html" class="border-color border-2 p-2 border-dashed ml-2 hover:bg-red-500">Go back</a>

        <div class="flex flex-col md:flex-row md:absolute md:left-1/2 md:transform md:-translate-x-1/2">
            <input type="number" id="betInput" min="0.1" value="1" step="0.1" class="focus:outline-0 md:border-t-2 md:border-b-2  md:border-r-0 border-l-2 border-r-2 border-dashed text-color bg-color text-center">
            <button id="placeBetButton" class="border-color border-2 p-2 border-dashed hover:bg-red-500">Place Bet</button>
        </div>

        <p id="coinDisplay" class="border-color border-2 p-2 border-dashed"></p>
    </div>

    <div class="flex flex-col justify-center items-center my-8">
        <p id="randomNumbers" class="text-center text-color font-black"></p>
        <p id="correctGuesses" class="text-center text-color font-black"></p>
        <p id="result" class="text-center text-color font-black"></p>
    </div>

    <div class="flex justify-center items-center mt-10">
        <div id="grid" class="flex flex-wrap" style="width: 26rem;">
        </div>
    </div>

    <script type="module" src="lucky_numbers.js"></script>
    <script type="module" src="../../js/data.js"></script>
</body>
</html>
