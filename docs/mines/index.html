<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mines</title>
    <link rel="stylesheet" href="../../css/output.css">
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <a href="../../index.html" class="bg-red-500 p-2">Go back</a>
    <div class="flex flex-col items-center justify-center">
        <h1 class="text-center text-4xl font-bold text-white">Mines</h1>
        <p id="coins" class="text-white"></p>

        <div class="flex justify-between items-center ">
            <input type="number" id="betInput" min="0" value="0" class="text-center">
            <button id="placeBetButton" class="rounded-sm bg-red-500 p-1 text-white">Place Bet</button>
            <button id="withdrawButton" class="rounded-sm bg-red-500 p-1 text-white">Withdraw</button>
        </div>

        <p id="multiply" class="text-center text-white">Multiply: 1.0</p>
        <p id="timer" class="text-white"></p>
    </div>


<div class="flex justify-center items-center h-screen">
    <div id="minefield" class="flex flex-wrap" style="width: 26rem;">
        <!-- The squares will be appended here by the JavaScript code -->
    </div>
</div>

    <script src="mines.js"></script>
</body>
</html>
