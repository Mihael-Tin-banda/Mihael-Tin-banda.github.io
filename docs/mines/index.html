<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mines</title>
    <link rel="stylesheet" href="../../css/output.css">
    <link rel="stylesheet" href="../../css/main.css">
    <link rel="stylesheet" href="main.css">

    <style>
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
               -webkit-appearance: none;
                margin: 0;
        }
 
        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body>
    <div class="flex md:flex-row flex-col justify-between items-center relative mt-2">
        <a href="../../index.html" class="border-color border-2 p-2 border-dashed ml-2 hover:bg-red-500">Go back</a>

        <div class="flex flex-col md:flex-row md:absolute md:left-1/2 md:transform md:-translate-x-1/2">
            <p id="multiply" class="border-color border-2 p-2 border-dashed">Multiply: 1.0</p>

            <input type="number" id="betInput" min="0.1" step="0.1" value="1" class="focus:outline-0 md:border-t-2 md:border-b-2 md:border-l-0 md:border-r-0 border-l-2 border-r-2 border-dashed text-color bg-color text-center">

            <button id="placeBetButton" class="border-color border-2 p-2 border-dashed hover:bg-red-500">Place Bet</button>
            <button id="withdrawButton" class="border-color border-2 p-2 border-dashed hover:bg-red-500" style="display: none;">Withdraw</button>
        </div>

        <p id="coinDisplay" class="border-color border-2 p-2 border-dashed"></p>
    </div>

<div class="flex justify-center items-center mt-12">
    <div id="minefield" class="flex flex-wrap" style="width: 26rem;">
        <!-- The squares will be appended here by the JavaScript code -->
    </div>
</div>

<div class="flex justify-center items-center mt-12">
    <p id="timer" class="border-color border-2 p-2 border-dashed hidden"></p>
</div>

    <script type="module" src="mines.js"></script>
    <script type="module" src="../../js/data.js"></script>
</body>
</html>
