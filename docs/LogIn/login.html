<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Steps</title>
    <link rel="stylesheet" href="css/output.css" />
    <link rel="stylesheet" href="css/main.css" />
  </head>

  <body class="w-full h-screen flex flex-col justify-between overflow-auto bg-color cutive-mono-regular">





    <!-- NAV -->
    <div class="flex justify-between items-center relative">
      <p id="coinDisplay" class="border-color border-2 p-2 border-dashed ml-2">Coins: 0.0</p>

      <h1 class="text-5xl absolute left-1/2 transform -translate-x-1/2">"STEPS"</h1>

      <div class="flex">
        <button id="authorizeButton" class="border-color border-2 p-2 border-dashed hover:bg-red-500 mr-2">Authorize Fitbit</button>
        <button id="getStepsButton" class="border-color border-2 p-2 border-dashed hover:bg-red-500 mr-2">Get Steps</button>
      </div>
    </div>
    <script>
        window.coins = 0;

        document.getElementById('authorizeButton').addEventListener('click', function() {
            var urlParams = new URLSearchParams(window.location.search);
            var code = urlParams.get('code');

            if (!code) {
                window.location.href = `https://www.fitbit.com/oauth2/authorize?response_type=code&client_id=23RT5X&scope=profile activity&redirect_uri=https://mihael-tin-banda.github.io&state=2w6v1l1h502m0o4d006t242s095y6w2g`;
            } else {
                fetch('https://api.fitbit.com/oauth2/token', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Basic ' + btoa(`23RT5X` + ':' + `579d36577af143adf1e504fa3ccb47aa`),
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: 'grant_type=authorization_code&code=' + code + '&redirect_uri=https://mihael-tin-banda.github.io'
                })
                .then(response => response.json())
                .then(data => {
                    var access_token = data.access_token; // Use the access token from the response

                    fetch('https://api.fitbit.com/1/user/-/activities/steps/date/today/1d.json', {
                        headers: {
                            'Authorization': 'Bearer ' + access_token
                        }
                    })
                    .then(response => response.json())
                    .then(data => {
                        // Update the global variable
                        window.coins = data['activities-steps'][0].value;
                        document.getElementById('coinDisplay').textContent = "Coins: " + window.coins;
                    })
                    .catch(error => console.error('Error:', error));
                })
                .catch(error => console.error('Error:', error));
            }
        });
    </script>
</body>
</html>
