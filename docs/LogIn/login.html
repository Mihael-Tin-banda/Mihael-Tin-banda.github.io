<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Fitbit Authorization</title>
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
        <style>
            body {
                background-color: #18181D;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                margin: 0;
                color: white;
            }
            button {
                background-color: #18181D;
                color: white;
                border: 2px solid white;
                padding: 20px;
                font-size: 20px;
                margin: 10px;
            }
        </style>
    </head>

    <body>
        <div>
            <button id="authorizeButton">Authorize Fitbit</button>
            <button id="getStepsButton">Get Steps</button>
        </div>

        <script>
            $(document).ready(function() {
                $('#authorizeButton').click(function() {
                    // Start the OAuth 2.0 flow
                    var client_id = '23RT5X'; 
                    var redirect_uri = 'https://mihael-tin-banda.github.io/docs/LogIn/login.html'; 
                    var response_type = 'token'; 
                    var scope = 'activity profile';

                    var authorizationUrl = 'https://www.fitbit.com/oauth2/authorize?' +
                            'response_type=' + encodeURIComponent(response_type) +
                            '&client_id=' + encodeURIComponent(client_id) +
                            '&redirect_uri=' + encodeURIComponent(redirect_uri) +
                            '&scope=' + encodeURIComponent(scope);

                    // Redirect the user to the Fitbit authorization page
                    window.location.href = authorizationUrl;
                });

                $('#getStepsButton').click(function() {
                    // Get the access token from the URL
                    var access_token = window.location.hash.split('=')[1].split('&')[0];

                    // Make a request to the Fitbit Web API to get the user's profile
                    $.ajax({
                        url: 'https://api.fitbit.com/1/user/-/profile.json',
                        method: 'GET',
                        headers: {
                            'Authorization': 'Bearer ' + access_token
                        },
                        success: function(response) {
                            var username = response.user.displayName;

                            // Make a request to the Fitbit Web API to get the user's step count
                            $.ajax({
                                url: 'https://api.fitbit.com/1/user/-/activities/steps/date/today/1d.json',
                                method: 'GET',
                                headers: {
                                    'Authorization': 'Bearer ' + access_token
                                },
                                success: function(response) {
                                    var stepCount = response['activities-steps'][0].value;

                                    // Send the step count and username to the specified URL
                                    var url = 'https://mihael-tin-banda.github.io/index.html?' +
                                            'stepCount=' + encodeURIComponent(stepCount) +
                                            '&username=' + encodeURIComponent(username);

                                    window.location.href = url;
                                }
                            });
                        }
                    });
                });
            });
        </script>
    </body>
</html>
