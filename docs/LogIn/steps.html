<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            background-color: #18181D;
        }
    </style>
</head>
<body>
    <script>
        window.onload = function() {
            // Use the provided access token
            var access_token = 'eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiIyM1JUNVgiLCJzdWIiOiJCWjRLRkgiLCJpc3MiOiJGaXRiaXQiLCJ0eXAiOiJhY2Nlc3NfdG9rZW4iLCJzY29wZXMiOiJ3YWN0IHdwcm8iLCJleHAiOjE3MTAzMDY3ODEsImlhdCI6MTcxMDI3Nzk4MX0.FfcpwEyfUEVO3vjNpbJzy-C_wMIQvgABcR--_Mu5GRE';
            var steps;

            // Fetch the step data
            fetch('https://api.fitbit.com/1/user/-/activities/steps/date/today/1d.json', {
                headers: {
                    'Authorization': 'Bearer ' + access_token
                }
            })
            .then(response => response.json())
            .then(data => {
                // Save the step data in local storage
                steps = data['activities-steps'][0].value;
                localStorage.setItem('steps', steps);

                // Fetch the user profile information
                return fetch('https://api.fitbit.com/1/user/-/profile.json', {
                    headers: {
                        'Authorization': 'Bearer ' + access_token
                    }
                });
            })
            .then(response => response.json())
            .then(data => {
                // Save the user name in local storage
                var userName = data.user.displayName;
                localStorage.setItem('userName', userName);

                // Calculate coins and save it in local storage
                var coins = localStorage.getItem('steps') / 100;
                localStorage.setItem('coins', coins);

                // Save user data in an object
                var userData = {
                    userName: userName,
                    coins: coins,
                    steps: steps
                };

                // Get the current user data from localStorage
                var currentUserData = JSON.parse(localStorage.getItem('userData')) || [];

                // Add the new user data to the current user data
                currentUserData.push(userData);

                // Save the updated user data back to localStorage
                localStorage.setItem('userData', JSON.stringify(currentUserData));

                // Redirect to the specified URL with coins and username as query parameters
                window.location.href = 'https://mihael-tin-banda.github.io/index.html?coins=' + encodeURIComponent(coins) + '&username=' + encodeURIComponent(userName);
            })
            .catch(error => console.error('Error:', error));
        };
    </script>
</body>
</html>
