<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Steps</title>
    <link rel="stylesheet" href="css/output.css" />
    <link rel="stylesheet" href="css/main.css" />
  </head>

  <body
    class="w-full h-screen flex flex-col justify-between overflow-auto bg-color"
  >
    <div class="flex justify-between">
      <h1 class="text-4xl bold-with-space">Steps</h1>

      <button id="authorizeButton">Authorize Fitbit</button>

      <p id="coinDisplay">Coins:</p>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 p-3">
      <!-- PACHINKO -->

      <a
        href="docs/pachinko/index.html"
        class="group relative block h-64 sm:h-80"
      >
        <span
          class="absolute inset-0 border-2 border-dashed border-color"
        ></span>

        <div
          class="relative flex h-full transform items-end border-2 border-color bg-color transition-transform group-hover:-translate-x-2 group-hover:-translate-y-2"
        >
          <div
            class="p-4 !pt-0 transition-opacity group-hover:absolute group-hover:opacity-0 sm:p-6 lg:p-8"
          >
            <img src="assets/ikone/pachinko.svg" class="filter-white" />

            <h2 class="mt-4 text-xl font-medium sm:text-2xl">Pachinko</h2>
          </div>

          <div
            class="absolute p-4 opacity-0 transition-opacity group-hover:relative group-hover:opacity-100 sm:p-6 lg:p-8"
          >
            <h3 class="mt-4 text-xl font-medium sm:text-2xl">Pachinko</h3>

            <p class="mt-4 text-sm sm:text-base">
              Suck the balls into the hole and win the game.
            </p>

            <p class="mt-8 font-bold">Press</p>
          </div>
        </div>
      </a>

      <!-- MINES -->

      <a href="docs/mines/index.html" class="group relative block h-64 sm:h-80">
        <span
          class="absolute inset-0 border-2 border-dashed border-color"
        ></span>

        <div
          class="relative flex h-full transform items-end border-2 border-color bg-color transition-transform group-hover:-translate-x-2 group-hover:-translate-y-2"
        >
          <div
            class="p-4 !pt-0 transition-opacity group-hover:absolute group-hover:opacity-0 sm:p-6 lg:p-8"
          >
            <img src="assets/ikone/bomb.svg" class="filter-white" />

            <h2 class="mt-4 text-xl font-medium sm:text-2xl">Mines</h2>
          </div>

          <div
            class="absolute p-4 opacity-0 transition-opacity group-hover:relative group-hover:opacity-100 sm:p-6 lg:p-8"
          >
            <h3 class="mt-4 text-xl font-medium sm:text-2xl">Mines</h3>

            <p class="mt-4 text-sm sm:text-base">
              Mines are everywhere. You have to find them and avoid them.
            </p>

            <p class="mt-8 font-bold">Press</p>
          </div>
        </div>
      </a>

      <!-- BLACK JACK -->
      <a
        href="docs/blackjack/index.html"
        class="group relative block h-64 sm:h-80"
      >
        <span
          class="absolute inset-0 border-2 border-dashed border-color"
        ></span>

        <div
          class="relative flex h-full transform items-end border-2 border-color bg-color transition-transform group-hover:-translate-x-2 group-hover:-translate-y-2"
        >
          <div
            class="p-4 !pt-0 transition-opacity group-hover:absolute group-hover:opacity-0 sm:p-6 lg:p-8"
          >
            <img src="assets/ikone/playing-cards.svg" class="filter-white" />

            <h2 class="mt-4 text-xl font-medium sm:text-2xl">Black Jack</h2>
          </div>

          <div
            class="absolute p-4 opacity-0 transition-opacity group-hover:relative group-hover:opacity-100 sm:p-6 lg:p-8"
          >
            <h3 class="mt-4 text-xl font-medium sm:text-2xl">Black Jack</h3>

            <p class="mt-4 text-sm sm:text-base">
              Jack Black is a great actor and a great musician. He is also a
              great game.
            </p>

            <p class="mt-8 font-bold">Press</p>
          </div>
        </div>
      </a>
    </div>
    <script src="js/main.js"></script>
    <script>
      // Step 1: Redirect the user to the Fitbit authorization page
      document.getElementById('authorizeButton').addEventListener('click', function() {
        window.location.href = `https://www.fitbit.com/oauth2/authorize?response_type=code&client_id=23RT5X&scope=activity&redirect_uri=http://localhost:8553s&state=2w6v1l1h502m0o4d006t242s095y6w2g`;
      });

      // Step 2: The user is redirected back to your redirect_uri with a code in the URL
      // This code should be run on the page at your redirect_uri
      var urlParams = new URLSearchParams(window.location.search);
      var code = urlParams.get('code');

      if (code) {
        // Step 3: Exchange the authorization code for an access token and refresh token
        fetch('https://api.fitbit.com/oauth2/token', {
          method: 'POST',
          headers: {
            'Authorization': 'Basic ' + btoa(`23RT5X` + ':' + `579d36577af143adf1e504fa3ccb47aa`),
            'Content-Type': 'application/x-www-form-urlencoded'
          },
          body: 'grant_type=authorization_code&code=' + code + '&redirect_uri=http://localhost:8553'
        })
        .then(response => response.json())
        .then(data => {
          var access_token = data.access_token;
          var refresh_token = data.refresh_token;

          // Step 4: Use the access token to get the user's step data
          fetch('https://api.fitbit.com/1/user/-/activities/steps/date/today/1d.json', {
            headers: {
              'Authorization': 'Bearer ' + access_token
            }
          })
          .then(response => response.json())
          .then(data => {
            var steps = data['activities-steps'][0].value;

            // Step 5: Add the number of steps to the user's coin value
            // This depends on how you're storing the user's coin value
            // For example, if you're storing it in a variable:
            var coins = 0;
            coins += parseInt(steps);
          });
        });
    };
    </script>
  </body>
  </html>
