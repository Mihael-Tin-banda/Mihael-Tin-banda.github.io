<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steps</title>
    <link rel="stylesheet" href="css/output.css">
</head>
<body class="w-full">
  <div class="flex justify-between">
    <h1 class="text-5xl">"Steps"</h1>

    <p id="coinDisplay">Coins: </p>
  </div>

    <div style="display: flex; justify-content: space-between; width: 100%;">
      <!-- PACHINKO -->

      <a href="docs/pachinko/index.html" class="group relative block h-64 sm:h-80 lg:h-96 w-1/2">
          <span class="absolute inset-0 border-2 border-dashed border-black"></span>

          <div class="relative flex h-full transform items-end border-2 border-black bg-white transition-transform group-hover:-translate-x-2 group-hover:-translate-y-2">
              <div class="p-4 !pt-0 transition-opacity group-hover:absolute group-hover:opacity-0 sm:p-6 lg:p-8">            
              <svg height="100" width="100">
                <defs>
                  <radialGradient id="shinyGradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
                    <stop offset="0%" style="stop-color:rgb(200,120,120);stop-opacity:1" />
                    <stop offset="100%" style="stop-color:rgb(239,68,68);stop-opacity:1" />
                  </radialGradient>
                </defs>
                <circle cx="50" cy="50" r="40" fill="url(#shinyGradient)" />
              </svg>
            
              <h2 class="mt-4 text-xl font-medium sm:text-2xl">Pachinko</h2>
            </div>
          
            <div class="absolute p-4 opacity-0 transition-opacity group-hover:relative group-hover:opacity-100 sm:p-6 lg:p-8">
              <h3 class="mt-4 text-xl font-medium sm:text-2xl">Pachinko</h3>
            
              <p class="mt-4 text-sm sm:text-base">
                Suck the balls into the hole and win the game.
              </p>
            
              <p class="mt-8 font-bold">Press</p>
            </div>
          </div>
        </a>

        <!-- MINESWEPER -->

        <a href="docs/mines/index.html" class="group relative block h-64 sm:h-80 lg:h-96 w-1/2">
          <span class="absolute inset-0 border-2 border-dashed border-black"></span>
        
          <div class="relative flex h-full transform items-end border-2 border-black bg-white transition-transform group-hover:-translate-x-2 group-hover:-translate-y-2">
              <div class="p-4 !pt-0 transition-opacity group-hover:absolute group-hover:opacity-0 sm:p-6 lg:p-8">            
              <svg height="100" width="100">
                <circle cx="50" cy="50" r="30" fill="black" />
                <line x1="50" y1="21" x2="60" y2="0" style="stroke:brown;stroke-width:3" />
                <polygon points="60,-5 62,0 67,0 63,3 65,8 60,5 55,8 57,3 53,0 58,0" fill="red"/>
                <circle cx="60" cy="2" r="2" fill="yellow" />
              </svg>
            
              <h2 class="mt-4 text-xl font-medium sm:text-2xl">Mines</h2>
            </div>
          
            <div class="absolute p-4 opacity-0 transition-opacity group-hover:relative group-hover:opacity-100 sm:p-6 lg:p-8">
              <h3 class="mt-4 text-xl font-medium sm:text-2xl">Mines</h3>
            
              <p class="mt-4 text-sm sm:text-base">
                Mines are everywhere. You have to find them and avoid them.
              </p>
            
              <p class="mt-8 font-bold">Press</p>
            </div>
          </div>
        </a>
      </div>

      <!-- BLACK JACK -->

      <a href="docs/blackjack/index.html" class="group relative block h-64 sm:h-80 lg:h-96 w-1/2">
        <span class="absolute inset-0 border-2 border-dashed border-black"></span>
      
        <div class="relative flex h-full transform items-end border-2 border-black bg-white transition-transform group-hover:-translate-x-2 group-hover:-translate-y-2">
            <div class="p-4 !pt-0 transition-opacity group-hover:absolute group-hover:opacity-0 sm:p-6 lg:p-8">            
            <svg height="100" width="140" style="transform: rotate(-5deg); position: absolute; bottom: 100;left: 30">
              <defs>
                <linearGradient id="redCardGradient" x1="100%" y1="0%" x2="0%" y2="0%">
                  <stop offset="0%" style="stop-color:red;stop-opacity:1" />
                  <stop offset="100%" style="stop-color:pink;stop-opacity:1" />
                </linearGradient>
              </defs>
              <rect width="140" height="200" style="fill:url(#redCardGradient);stroke-width:2;stroke:red" />
              <text x="20" y="35" font-size="35" text-anchor="middle" fill="red">A</text>
            </svg>

            <svg height="100" width="140" style="margin-left:20px; transform: rotate(5deg); position: absolute; bottom: 90; left: 60">
              <defs>
                <linearGradient id="blackCardGradient" x1="100%" y1="0%" x2="0%" y2="0%">
                  <stop offset="0%" style="stop-color:black;stop-opacity:1" />
                  <stop offset="100%" style="stop-color:gray;stop-opacity:1" />
                </linearGradient>
              </defs>
              <rect width="140" height="200" style="fill:url(#blackCardGradient);stroke-width:2;stroke:black" />
              <text x="20" y="35" font-size="35" text-anchor="middle" fill="black">A</text>
            </svg>
            <h2 class="mt-4 text-xl font-medium sm:text-2xl">Black Jack</h2>
          </div>
        
          <div class="absolute p-4 opacity-0 transition-opacity group-hover:relative group-hover:opacity-100 sm:p-6 lg:p-8">
            <h3 class="mt-4 text-xl font-medium sm:text-2xl">Black Jack</h3>
          
            <p class="mt-4 text-sm sm:text-base">
              Jack Black is a great actor and a great musician. He is also a great game.
            </p>
          
            <p class="mt-8 font-bold">Press</p>
          </div>
        </div>
      </a>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
