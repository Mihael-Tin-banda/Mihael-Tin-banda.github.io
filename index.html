<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Google Fit Authorization</title>
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
        <script src="https://accounts.google.com/gsi/client" async defer></script>
        <style>
            body {
                background-color: #18181D;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                margin: 0;
                color: white;
            }
            button {
                background-color: #18181D;
                color: white;
                border: 2px solid white;
                padding: 20px;
                font-size: 20px;
                margin: 10px;
            }
        </style>
    </head>

    <body>
        <div>
            <div class="g_id_signin" data-type="standard"></div>
            <button id="getStepsButton">Get Steps</button>
        </div>

        <script>
            var googleCredentials = {
                "web": {
                    "client_id": "786268764964-07k8euka1hg47u2amgl6fe5u4fko9j81.apps.googleusercontent.com",
                    "project_id": "pristine-ally-417110",
                    "auth_uri": "https://accounts.google.com/o/oauth2/auth",
                    "token_uri": "https://oauth2.googleapis.com/token",
                    "auth_provider_x509_cert_url": "https://www.googleapis.com/oauth2/v1/certs",
                    "client_secret": "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",
                    "redirect_uris": ["http://127.0.0.1:5500/docs/home-page/home-page.html"],
                    "javascript_origins": ["https://mihael-tin-banda.github.io"]
                }
            };

            function handleCredentialResponse(response) {
                var access_token = response.credential;
                sessionStorage.setItem('access_token', access_token);
            }

            window.onload = function() {
                google.accounts.id.initialize({
                    client_id: googleCredentials.web.client_id,
                    callback: handleCredentialResponse
                });
                google.accounts.id.renderButton(
                    document.getElementsByClassName('g_id_signin')[0],
                    { theme: 'outline', size: 'large' }
                );
            };

            $(document).ready(function() {
                $('#getStepsButton').click(function() {
                    var access_token = sessionStorage.getItem('access_token');

                    $.ajax({
                        url: 'https://www.googleapis.com/fitness/v1/users/me/dataset:aggregate',
                        method: 'POST',
                        headers: {
                            'Authorization': 'Bearer ' + access_token
                        },
                        data: JSON.stringify({
                            "aggregateBy": [{
                                "dataTypeName": "com.google.step_count.delta",
                                "dataSourceId": "derived:com.google.step_count.delta:com.google.android.gms:estimated_steps"
                            }],
                            "bucketByTime": { "durationMillis": 86400000 },
                            "startTimeMillis": 1617235200000,
                            "endTimeMillis": 1617321600000
                        }),
                        contentType: 'application/json',
                        success: function(response) {
                            var stepCount = response.bucket[0].dataset[0].point[0].value[0].intVal;
                            var url = 'https://mihael-tin-banda.github.io/index.html?' +
                                    'stepCount=' + encodeURIComponent(stepCount);

                            window.location.href = url;
                        }
                    });
                });
            });
        </script>
    </body>
</html>
