<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steps</title>
    <link rel="stylesheet" href="css/output.css">
    <link rel="stylesheet" href="css/main.css">
</head>
<body class="w-full h-screen flex flex-col justify-between overflow-auto bg-color">
  <div class="flex justify-between">
    <h1 class="text-4xl bold-with-space">Steps</h1>

    <p id="coinDisplay">Coins:</p>
  </div>

  <div class="p-4 grid grid-cols-1 lg:grid-cols-2 gap-4 flex-grow items-center">
    <!-- PACHINKO -->

    <a href="docs/pachinko/index.html" class="group relative block h-full">
      <span class="absolute inset-0 border-2 border-dashed border-color"></span>

          <div class="relative flex h-full transform items-end border-2 border-color element-color transition-transform group-hover:-translate-x-2 group-hover:-translate-y-2">
              <div class="p-4 !pt-0 transition-opacity group-hover:absolute group-hover:opacity-0 sm:p-6 lg:p-8">            
              <img src="assets/ikone/pachinko.svg" class="filter-white">
              
              <h2 class="mt-4 text-xl font-medium sm:text-2xl">Pachinko</h2>
            </div>
          
            <div class="absolute p-4 opacity-0 transition-opacity group-hover:relative group-hover:opacity-100 sm:p-6 lg:p-8">
              <h3 class="mt-4 text-xl font-medium sm:text-2xl">Pachinko</h3>
            
              <p class="mt-4 text-sm sm:text-base">
                Suck the balls into the hole and win the game.
              </p>
            
              <p class="mt-8 font-bold">Press</p>
            </div>
          </div>
        </a>

        <!-- MINESWEPER -->

        <a href="docs/mines/index.html" class="group relative block h-full">
          <span class="absolute inset-0 border-2 border-dashed border-color"></span>
        
          <div class="relative flex h-full transform items-end border-2 border-color element-color transition-transform group-hover:-translate-x-2 group-hover:-translate-y-2">
              <div class="p-4 !pt-0 transition-opacity group-hover:absolute group-hover:opacity-0 sm:p-6 lg:p-8">            
              <img src="assets/ikone/bomb.svg" class="filter-white">
            
              <h2 class="mt-4 text-xl font-medium sm:text-2xl">Mines</h2>
            </div>
          
            <div class="absolute p-4 opacity-0 transition-opacity group-hover:relative group-hover:opacity-100 sm:p-6 lg:p-8">
              <h3 class="mt-4 text-xl font-medium sm:text-2xl">Mines</h3>
            
              <p class="mt-4 text-sm sm:text-base">
                Mines are everywhere. You have to find them and avoid them.
              </p>
            
              <p class="mt-8 font-bold">Press</p>
            </div>
          </div>
        </a>
  

      <!-- BLACK JACK -->

      <a href="docs/blackjack/index.html" class="group relative block h-full">
        <span class="absolute inset-0 border-2 border-dashed border-color"></span>
      
        <div class="relative flex h-full transform items-end border-2 border-color element-color transition-transform group-hover:-translate-x-2 group-hover:-translate-y-2">
            <div class="p-4 !pt-0 transition-opacity group-hover:absolute group-hover:opacity-0 sm:p-6 lg:p-8">            
            <img src="assets/ikone/playing-cards.svg" class="filter-white">
            <h2 class="mt-4 text-xl font-medium sm:text-2xl">Black Jack</h2>
          </div>
        
          <div class="absolute p-4 opacity-0 transition-opacity group-hover:relative group-hover:opacity-100 sm:p-6 lg:p-8">
            <h3 class="mt-4 text-xl font-medium sm:text-2xl">Black Jack</h3>
          
            <p class="mt-4 text-sm sm:text-base">
              Jack Black is a great actor and a great musician. He is also a great game.
            </p>
          
            <p class="mt-8 font-bold">Press</p>
          </div>
        </div>
      </a>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
